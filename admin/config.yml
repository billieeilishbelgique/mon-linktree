backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "pages"
    label: "Pages"
    files:
      - file: "content/home.md"
        label: "Accueil"
        name: "home"
        fields:
          - {label: "Titre", name: "title", widget: "string"}
          - {label: "Bio", name: "bio", widget: "text"}
